version: '3'
services:

  nats_server:
    image: nats:latest
    ports:
      - 4222:4222
      - 6222:6222
      - 8222:8222

  client-gateway:
    build: ./client-gateway
    ports:
      - ${CLIENT_GATEWAY_PORT}:3000
    volumes:
      - ./client-gateway/src:/usr/src/app/src
    command: npm run start:dev
    environment:
      - PORT=3000
      - NATS_SERVERS=nats://nats_server:4222

 

 





